<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Police Teardown DB</title>
<style>
  :root{
    --bg:#0b0b0c; --bg2:#121214; --card:#1a1a1c; --line:#262629;
    --text:#f8f9fa; --muted:#8e8e93; --accent:#ffb800; --accent2:#ff453a;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing: antialiased;
  }
  header{
    padding:16px 24px; background:var(--bg2); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
    position:sticky; top:0; z-index:10;
  }
  header h1{font-size:20px; margin:0; letter-spacing:0.5px; font-weight: 800;}
  header h1 span{color:var(--accent);}
  
  .nav-group{display:flex; gap:10px; align-items:center;}
  nav{display:flex; gap:10px; flex-wrap:wrap;}
  nav button, .btn{
    background:var(--accent); color:#111; border:none; padding:10px 18px;
    border-radius:var(--radius); font-weight:600; cursor:pointer; font-size:14px;
    transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
  }
  nav button:hover, .btn:hover{ opacity: 0.9; transform: translateY(-1px); }
  nav button.secondary, .btn.secondary{background:var(--card); color:var(--text); border:1px solid var(--line);}
  nav button.danger, .btn.danger{background:var(--accent2); color:#fff;}
  
  .badge-status {
    font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 6px 12px; 
    border-radius: 20px; letter-spacing: 1px;
  }
  .status-admin { background: rgba(255,184,0,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .status-viewer { background: rgba(142,142,147,0.12); color: var(--muted); border: 1px solid var(--line); }

  main{padding:24px; max-width:1200px; margin:0 auto;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px;}
  
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; cursor:pointer; transition:all 0.2s ease; position:relative;
  }
  .card:hover{border-color:var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);}
  .card h3{margin:0 0 6px; font-size:18px; font-weight: 700; line-height: 1.3;}
  .card p{margin:4px 0; font-size:13px; color:var(--muted);}
  .tag{
    display:inline-block; background:rgba(255,184,0,0.08); border:1px solid rgba(255,184,0,0.15);
    padding:4px 10px; border-radius:20px; font-size:11px; color:var(--accent); margin-top:12px; font-weight: 600;
  }
  
  .ck{position:absolute; top:20px; right:20px; width:18px; height:18px; z-index:2; cursor:pointer;}
  
  .compare-bar{
    position:fixed; bottom:24px; left:50%; transform: translateX(-50%); background:var(--bg2); 
    border:1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    padding:12px 24px; border-radius: 30px; display:flex; align-items:center; gap:16px; z-index:20;
  }
  
  table.compare-table{width:100%; border-collapse:collapse; font-size:14px; background: var(--card); border-radius: var(--radius); overflow: hidden;}
  table.compare-table th, table.compare-table td{ border:1px solid var(--line); padding:12px 16px; text-align:left; vertical-align:top; }
  table.compare-table th{background:var(--bg2); color:var(--accent); font-weight: 700;}
  table.compare-table td.label-col{ background:var(--bg2); color:var(--muted); font-weight:600; white-space:nowrap; }
  table.compare-table tr.section-row td{background:rgba(255,184,0,0.04); color:var(--accent); font-weight:700; font-size:12px; letter-spacing:1px; text-transform:uppercase;}
  .table-scroll{overflow-x:auto; border-radius: var(--radius); border: 1px solid var(--line); margin-top: 16px; padding-bottom: 4px;}
  
  form{display:flex; flex-direction:column; gap:16px;}
  fieldset{border:1px solid var(--line); border-radius:var(--radius); padding:20px; background:var(--card);}
  legend{padding:0 10px; font-weight:700; color:var(--accent); font-size:16px;}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px;}
  input[type=text], select{ width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; }
  input[type=text]:focus, select:focus{ border-color: var(--accent); outline: none; }
  
  .field{margin-bottom:12px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .abrasion-block{ border:1px dashed var(--line); border-radius:8px; padding:12px; margin-bottom:12px; background:var(--bg2); }
  .abrasion-block .row2{grid-template-columns:1fr 2fr;}
  .actions{display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap;}
  
  .detail-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
  .detail-section{ background: var(--card); border: 1px solid var(--line); padding: 20px; border-radius: var(--radius); }
  .detail-section h2{font-size:15px; color:var(--accent); margin: 0 0 16px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
  .kv{display:grid; grid-template-columns:180px 1fr; gap:12px 16px; font-size:14px;}
  .kv div.k{color:var(--muted); font-weight: 500;}
  
  .badge-rating{font-weight:700; padding: 2px 6px; border-radius: 4px; font-size: 12px; background: rgba(255,255,255,0.05);}
  .badge-Poor{color:var(--accent2); background: rgba(255, 69, 58, 0.1);}
  .badge-Fair{color:#e0c419; background: rgba(224, 196, 25, 0.1);}
  .badge-Good{color:#7ed957; background: rgba(126, 217, 87, 0.1);}
  .badge-Excelent{color:#3ddc84; background: rgba(61, 220, 132, 0.1);}
  
  .empty{color:var(--muted); text-align:center; padding:80px 20px;}
  footer{text-align:center; padding:40px 10px; color:var(--muted); font-size:12px;}
  
  /* Sembunyikan semua elemen berkelas admin-only secara default */
  .admin-only { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>Shoe<span>Police</span> // Teardown DB</h1>
  <div class="nav-group">
    <nav>
      <button class="secondary" onclick="go('list')">📋 List Sepatu</button>
      <button class="admin-only" id="btnTambah" onclick="go('form')">➕ Tambah Hasil Bedah</button>
      <button class="secondary admin-only" id="btnExport" onclick="exportData()">⬇️ Export</button>
      <label class="btn secondary admin-only" id="lblImport" style="margin:0;">
        ⬆️ Import
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      </label>
      <button class="secondary admin-only" id="btnSetting" onclick="go('settings')">⚙️</button>
    </nav>
    <div id="statusBadge" class="badge-status status-viewer">👁️ Penonton</div>
  </div>
</header>

<main id="app"></main>

<footer>Shoe Police Teardown DB — data sinkron dengan Google Sheets.</footer>

<script>
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCKQ6Sai2qbn77CS5JtRVnr9-C6OMq_dUAZI-OnIJgqwOoKERRPovaqjwaItbWab7X/exec';
const SCRIPT_URL_KEY = 'sp_script_url';
let cachedData = null;

// DETEKSI ROLE BERDASARKAN URL PARAMETER (?admin=true)
const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get('admin') === 'true';

// Inject CSS langsung buat munculin tombol khusus kalau dia beneran admin
if (isAdmin) {
  const style = document.createElement('style');
  style.innerHTML = '.admin-only { display: inline-flex !important; }';
  document.head.appendChild(style);
}

function updateBadge() {
  const badge = document.getElementById('statusBadge');
  if (isAdmin) {
    badge.className = 'badge-status status-admin';
    badge.innerHTML = '⚡ Pemilik (Admin)';
  } else {
    badge.className = 'badge-status status-viewer';
    badge.innerHTML = '👁️ Penonton';
  }
}

function getScriptUrl(){ return localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_SCRIPT_URL; }
function setScriptUrl(url){ localStorage.setItem(SCRIPT_URL_KEY, url.trim()); }
function uid(){ return 'sh_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

async function apiGet(){
  const url = getScriptUrl();
  if(!url) throw new Error('NO_URL');
  const res = await fetch(url, { method: 'GET' });
  const json = await res.json();
  if(json.status !== 'ok') throw new Error(json.message || 'API error');
  return json.data;
}

async function apiPost(payload){
  const url = getScriptUrl();
  if(!url) throw new Error('NO_URL');
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if(json.status !== 'ok') throw new Error(json.message || 'API error');
  return json;
}

async function getData(forceRefresh){
  if(cachedData && !forceRefresh) return cachedData;
  cachedData = await apiGet();
  return cachedData;
}

const RATING_OPTIONS = ['', 'Poor', 'Fair', 'Good', 'Excelent'];
const GUSSET_OPTIONS = ['', 'Non-Gusseted', 'Semi Gusseted', 'Gusseted'];
const PADDING_OPTIONS = ['', 'Padding', 'No Padding'];

function selectOptions(options, selected){
  return options.map(o => `<option value="${o}" ${o===selected?'selected':''}>${o || '— pilih —'}</option>`).join('');
}

// ---------------- ROUTER ----------------
async function route(view, id){
  const app = document.getElementById('app');
  updateBadge();

  if(!getScriptUrl() && view !== 'settings'){
    app.innerHTML = `<div class="empty"><h2>👋 Setup Database</h2><button class="btn" onclick="go('settings')">⚙️ Masukin Script URL</button></div>`;
    return;
  }

  app.innerHTML = '<div class="empty">⏳ Memuat database bedah sepatu...</div>';
  try{
    if(view === 'list') app.innerHTML = renderList(await getData());
    else if(view === 'form') app.innerHTML = renderForm(id, id ? (await getData()).find(d=>d.id===id) : null);
    else if(view === 'detail') app.innerHTML = renderDetail((await getData()).find(d=>d.id===id), id);
    else if(view === 'compare'){
      const ids = id.split(',');
      const all = await getData();
      const items = ids.map(i => all.find(d=>d.id===i)).filter(Boolean);
      app.innerHTML = renderCompare(items);
    }
    else if(view === 'settings') app.innerHTML = renderSettings();
  } catch(err){
    app.innerHTML = `<div class="empty">
      <h2>⚠️ Gagal konek ke Google Sheets</h2>
      <p>${esc(err.message)}</p>
    </div>`;
  }
}

function renderSettings(){
  const url = getScriptUrl();
  return `
  <fieldset style="max-width:600px; margin:0 auto;">
    <legend>⚙️ Settings</legend>
    <div class="field">
      <label>Google Apps Script Web App URL</label>
      <input type="text" id="settingsUrl" value="${escAttr(url)}">
    </div>
    <div class="actions">
      <button class="btn secondary" onclick="go('list')">Batal</button>
      <button class="btn" onclick="saveSettings()">Simpan</button>
    </div>
  </fieldset>`;
}

function saveSettings(){
  const url = document.getElementById('settingsUrl').value.trim();
  if(!url){ alert('URL tidak boleh kosong'); return; }
  setScriptUrl(url);
  cachedData = null;
  go('list');
}

function handleHash(){
  const hash = location.hash.slice(1);
  if(hash.startsWith('detail/')) route('detail', hash.split('/')[1]);
  else if(hash.startsWith('edit/')) route('form', hash.split('/')[1]);
  else if(hash.startsWith('compare/')) route('compare', decodeURIComponent(hash.split('/')[1]));
  else if(hash === 'form') route('form');
  else if(hash === 'settings') route('settings');
  else route('list');
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', handleHash);

function go(view, id){
  // Tetap mempertahankan query string admin saat pindah halaman hash
  const q = isAdmin ? '?admin=true' : '';
  if(view==='detail') location.hash = 'detail/' + id;
  else if(view==='form' && id) location.hash = 'edit/' + id;
  else if(view==='form') location.hash = 'form';
  else if(view==='compare') location.hash = 'compare/' + encodeURIComponent(id);
  else if(view==='settings') location.hash = 'settings';
  else location.hash = '';
}
document.addEventListener('DOMContentLoaded', handleHash);

// ---------------- LIST ----------------
function renderList(data){
  if(data.length === 0){
    return `<div class="empty"><h2>Belum ada sepatu yang dibedah 👟</h2></div>`;
  }
  const cards = data.map(d => `
    <div class="card" onclick="go('detail','${d.id}')">
      <input type="checkbox" class="ck" data-id="${d.id}"
        ${selectedIds.has(d.id) ? 'checked' : ''}
        onclick="event.stopPropagation(); toggleSelect('${d.id}')">
      <h3>${esc(d.identify.brand)} ${esc(d.identify.model)}</h3>
      <p>Size: ${esc(d.identify.size) || '-'}</p>
      <span class="tag">${esc(d.identify.shoeType) || 'Unknown'}</span>
    </div>
  `).join('');
  
  const bar = selectedIds.size >= 2 ? `
    <div class="compare-bar">
      <span style="font-size:14px; font-weight:600;">⚖️ ${selectedIds.size} Sepatu Terpilih</span>
      <button class="btn" onclick="go('compare', Array.from(selectedIds).join(','))">Bandingkan</button>
      <button class="btn secondary" onclick="clearSelect()">Batal</button>
    </div>` : (selectedIds.size === 1 ? `
    <div class="compare-bar">
      <span style="font-size:13px; color:var(--muted)">Pilih 1 sepatu lagi untuk membandingkan</span>
      <button class="btn secondary" onclick="clearSelect()">Batal</button>
    </div>` : '');
    
  return `<div class="grid">${cards}</div>${bar}`;
}

let selectedIds = new Set();
function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  route('list');
}
function clearSelect(){
  selectedIds.clear();
  route('list');
}

// ---------------- FORM ----------------
function abrasionBlock(prefix, label, val){
  val = val || {};
  return `
  <div class="abrasion-block">
    <label>${label}</label>
    <div class="row2">
      <select id="${prefix}_rating">${selectOptions(RATING_OPTIONS, val.rating)}</select>
      <input type="text" id="${prefix}_note" placeholder="Keterangan uji gosok" value="${escAttr(val.note)}">
    </div>
  </div>`;
}

function renderForm(id, item){
  if(!isAdmin) { return `<div class="empty"><h2>🔒 Akses Ditolak</h2><p>Hanya pemilik yang bisa masuk halaman ini.</p></div>`; }
  
  const editing = !!id;
  const i = item ? item.identify : {};
  const u = item ? item.upper : {};
  const ab = item ? item.upper.abrasion : {};

  return `
  <form id="shoeForm" onsubmit="return saveForm(event,'${id||''}')">
    <fieldset>
      <legend>Identification</legend>
      <div class="row2">
        <div class="field"><label>Brand/Merk</label><input type="text" id="f_brand" value="${escAttr(i.brand)}" required></div>
        <div class="field"><label>Nama Model</label><input type="text" id="f_model" value="${escAttr(i.model)}" required></div>
      </div>
      <div class="row2">
        <div class="field"><label>Size Sample</label><input type="text" id="f_size" value="${escAttr(i.size)}"></div>
        <div class="field"><label>Jenis Sepatu</label><input type="text" id="f_shoeType" value="${escAttr(i.shoeType)}"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Anatomi & Material Upper</legend>
      <div class="row2">
        <div class="field"><label>Toe box</label><input type="text" id="f_toebox" value="${escAttr(u.toebox)}"></div>
        <div class="field"><label>Vamp</label><input type="text" id="f_vamp" value="${escAttr(u.vamp)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Quarter</label><input type="text" id="f_quarter" value="${escAttr(u.quarter)}"></div>
        <div class="field"><label>Tongue (Lidah)</label><input type="text" id="f_tongue" value="${escAttr(u.tongue)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Lining (Inner)</label><input type="text" id="f_lining" value="${escAttr(u.lining)}"></div>
        <div class="field"><label>Reinforcement</label><input type="text" id="f_reinforcement" value="${escAttr(u.reinforcement)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Gusseted Status</label>
          <select id="f_gusseted">${selectOptions(GUSSET_OPTIONS, u.gusseted)}</select>
        </div>
        <div class="field"><label>Padding Lidah</label>
          <select id="f_padding">${selectOptions(PADDING_OPTIONS, u.padding)}</select>
        </div>
      </div>
      <div class="field"><label>Ketebalan Material Upper (mm)</label><input type="text" id="f_thickness" value="${escAttr(u.thickness)}"></div>

      <label style="margin:16px 0 8px; font-weight:700; color:var(--accent)">Hasil Abrasion (Uji Gosok Dremel)</label>
      ${abrasionBlock('f_ab1', 'Material Upper Layer 1', ab && ab.material1)}
      ${abrasionBlock('f_ab2', 'Material Upper Layer 2', ab && ab.material2)}
      ${abrasionBlock('f_ab3', 'Material Upper Layer 3', ab && ab.material3)}
      ${abrasionBlock('f_ablining', 'Lining / Bagian Dalam', ab && ab.lining)}
    </fieldset>

    <div class="actions">
      <button type="button" class="btn secondary" onclick="go('list')">Batal</button>
      <button type="submit" class="btn">${editing ? 'Simpan Perubahan' : 'Publish Hasil Bedah'}</button>
    </div>
  </form>`;
}

async function saveForm(e, id){
  e.preventDefault();
  const val = (sel) => document.getElementById(sel).value.trim();
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Menyimpan...';

  const existing = id ? (await getData()).find(d=>d.id===id) : null;

  const newItem = {
    id: id || uid(),
    createdAt: existing ? existing.createdAt : Date.now(),
    identify: { brand: val('f_brand'), model: val('f_model'), size: val('f_size'), shoeType: val('f_shoeType') },
    upper: {
      toebox: val('f_toebox'), vamp: val('f_vamp'), quarter: val('f_quarter'), tongue: val('f_tongue'),
      lining: val('f_lining'), reinforcement: val('f_reinforcement'), gusseted: val('f_gusseted'),
      padding: val('f_padding'), thickness: val('f_thickness'),
      abrasion: {
        material1: { rating: val('f_ab1_rating'), note: val('f_ab1_note') },
        material2: { rating: val('f_ab2_rating'), note: val('f_ab2_note') },
        material3: { rating: val('f_ab3_rating'), note: val('f_ab3_note') },
        lining: { rating: val('f_ablining_rating'), note: val('f_ablining_note') },
      }
    }
  };

  try{
    await apiPost({ action: id ? 'update' : 'create', item: newItem });
    cachedData = null;
    go('detail', newItem.id);
  } catch(err){
    alert('Gagal simpan: ' + err.message);
    submitBtn.disabled = false;
  }
  return false;
}

// ---------------- DETAIL ----------------
function renderDetail(d, id){
  if(!d) return `<div class="empty"><h2>Data tidak ditemukan.</h2><button class="btn" onclick="go('list')">Kembali</button></div>`;

  const i = d.identify, u = d.upper, ab = u.abrasion || {};
  const abRow = (label, obj) => obj && obj.rating ? `
    <div class="k">${label}</div>
    <div><span class="badge-rating badge-${obj.rating}">${obj.rating}</span> ${obj.note ? '— ' + esc(obj.note) : ''}</div>
  ` : '';

  return `
  <div class="actions" style="justify-content:space-between; margin-bottom:20px;">
    <button class="btn secondary" onclick="go('list')">← Kembali ke List</button>
    <div class="actions admin-only">
      <button class="btn secondary" onclick="go('form','${d.id}')">✏️ Edit</button>
      <button class="btn danger" onclick="deleteItem('${d.id}')">🗑️ Hapus</button>
    </div>
  </div>

  <div class="detail-container">
    <div class="detail-section">
      <h2>Spesifikasi Dasar (Identify)</h2>
      <div class="kv">
        <div class="k">Brand</div><div><strong>${esc(i.brand)}</strong></div>
        <div class="k">Model</div><div>${esc(i.model)}</div>
        <div class="k">Size Kaki Dibedah</div><div>${esc(i.size) || '-'}</div>
        <div class="k">Kategori Sepatu</div><div>${esc(i.shoeType) || '-'}</div>
      </div>
    </div>

    <div class="detail-section">
      <h2>Material Teardown (Upper)</h2>
      <div class="kv">
        <div class="k">Toe box</div><div>${esc(u.toebox) || '-'}</div>
        <div class="k">Vamp</div><div>${esc(u.vamp) || '-'}</div>
        <div class="k">Quarter</div><div>${esc(u.quarter) || '-'}</div>
        <div class="k">Tongue</div><div>${esc(u.tongue) || '-'}</div>
        <div class="k">Lining Inside</div><div>${esc(u.lining) || '-'}</div>
        <div class="k">Reinforcement</div><div>${esc(u.reinforcement) || '-'}</div>
        <div class="k">Konstruksi Lidah</div><div>${esc(u.gusseted) || '-'}</div>
        <div class="k">Bantalan (Padding)</div><div>${esc(u.padding) || '-'}</div>
        <div class="k">Ketebalan Upper</div><div>${esc(u.thickness) || '-'}</div>
      </div>
    </div>

    <div class="detail-section">
      <h2>Kekuatan Durabilitas (Abrasion Test)</h2>
      <div class="kv">
        ${abRow('Material Lapisan 1', ab.material1) || '<div>-</div><div>Belum ada data uji gosok</div>'}
        ${abRow('Material Lapisan 2', ab.material2)}
        ${abRow('Material Lapisan 3', ab.material3)}
        ${abRow('Durabilitas Lining', ab.lining)}
      </div>
    </div>
  </div>`;
}

// ---------------- COMPARE ----------------
function renderCompare(items){
  if(items.length < 2) return `<div class="empty"><h2>Pilih minimal 2 sepatu untuk membandingkan.</h2></div>`;

  const abCell = (obj) => {
    if(!obj || !obj.rating) return '-';
    return `<span class="badge-rating badge-${obj.rating}">${obj.rating}</span>${obj.note ? '<br><small style="color:var(--muted)">' + esc(obj.note) + '</small>' : ''}`;
  };

  const headerCols = items.map(d => `<th>${esc(d.identify.brand)}<br><span style="font-size:12px;color:var(--muted)">${esc(d.identify.model)}</span></th>`).join('');

  const rows = [
    { section: 'Identifikasi' },
    { label: 'Brand', get: d => esc(d.identify.brand) },
    { label: 'Model', get: d => esc(d.identify.model) },
    { label: 'Size Sample', get: d => esc(d.identify.size) || '-' },
    { label: 'Kategori', get: d => esc(d.identify.shoeType) || '-' },
    { section: 'Hasil Bedah Upper' },
    { label: 'Toe box', get: d => esc(d.upper.toebox) || '-' },
    { label: 'Vamp', get: d => esc(d.upper.vamp) || '-' },
    { label: 'Quarter', get: d => esc(d.upper.quarter) || '-' },
    { label: 'Tongue', get: d => esc(d.upper.tongue) || '-' },
    { label: 'Lining', get: d => esc(d.upper.lining) || '-' },
    { label: 'Reinforcement', get: d => esc(d.upper.reinforcement) || '-' },
    { label: 'Lidah Gusseted?', get: d => esc(d.upper.gusseted) || '-' },
    { label: 'Padding', get: d => esc(d.upper.padding) || '-' },
    { label: 'Ketebalan Upper', get: d => esc(d.upper.thickness) || '-' },
    { section: 'Uji Gosok (Durabilitas)' },
    { label: 'Lapisan Material 1', get: d => abCell(d.upper.abrasion && d.upper.abrasion.material1) },
    { label: 'Lapisan Material 2', get: d => abCell(d.upper.abrasion && d.upper.abrasion.material2) },
    { label: 'Lapisan Material 3', get: d => abCell(d.upper.abrasion && d.upper.abrasion.material3) },
    { label: 'Kekuatan Lining', get: d => abCell(d.upper.abrasion && d.upper.abrasion.lining) },
  ];

  const bodyRows = rows.map(r => {
    if(r.section) return `<tr class="section-row"><td class="label-col">${r.section}</td>${items.map(()=>'<td></td>').join('')}</tr>`;
    return `<tr><td class="label-col">${r.label}</td>${items.map(d => `<td>${r.get(d)}</td>`).join('')}</tr>`;
  }).join('');

  return `
  <div class="actions" style="justify-content:space-between; margin-bottom:16px;">
    <button class="btn secondary" onclick="go('list')">← Kembali</button>
    <h2 style="margin:0; font-size:18px; font-weight:700;">⚖️ Komparasi Hasil Bedah (${items.length} Sepatu)</h2>
  </div>
  <div class="table-scroll">
    <table class="compare-table">
      <thead><tr><th class="label-col">Komponen</th>${headerCols}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>`;
}

async function deleteItem(id){
  if(!confirm('Hapus permanen dari Google Sheets?')) return;
  try{
    await apiPost({ action: 'delete', id: id });
    cachedData = null;
    go('list');
  } catch(err){ alert('Gagal hapus: ' + err.message); }
}

async function exportData(){
  try{
    const data = await getData(true);
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'shoepolice-teardown-' + Date.now() + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(err){ alert('Gagal export: ' + err.message); }
}

async function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev){
    try{
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported)) throw new Error('Format salah');
      for(const item of imported){ await apiPost({ action: 'create', item: item }); }
      cachedData = null;
      alert('Import sukses!');
      go('list');
    } catch(err){ alert('Gagal import: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function esc(str){
  if(str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(str){ return esc(str); }
